<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Gala - Banquete D5</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Iconos de Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fuentes -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>
        body, html { 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background-color: #1A0F0A;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .bg-custom {
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(74, 14, 23, 0.5) 0%, #1A0F0A 40%),
                radial-gradient(circle at 90% 80%, rgba(89, 104, 39, 0.3) 0%, #1A0F0A 40%),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        }
        
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-script { font-family: 'Great Vibes', cursive; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        
        .card-shadow { box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9), 0 0 50px rgba(74, 14, 23, 0.3); }

        .inner-border {
          border: 1px solid rgba(197, 160, 89, 0.4);
          outline: 1px solid rgba(197, 160, 89, 0.4);
          outline-offset: -6px;
        }

        /* Dimensiones exactas de la tarjeta para impresión (Media Carta: 5.5 x 8.5 pulgadas) */
        .menu-card {
            width: 5.5in;
            height: 8.5in;
            background-color: #751428; /* Fondo predominante Tinto/Vino ajustado para evitar que imprima café */
        }

        /* ESTILOS ESPECÍFICOS PARA LA IMPRESIÓN */
        @media print {
            body {
                background-color: white !important;
                background-image: none !important;
            }
            /* Configurar la hoja en tamaño carta horizontal (Landscape) sin márgenes del navegador */
            @page {
                size: letter landscape;
                margin: 0;
            }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- BARRA DE CONTROLES (No se imprime) -->
    <div class="print:hidden w-full bg-[#1A0F0A] border-b-2 border-[#C5A059] p-4 shadow-lg z-50 sticky top-0">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3 text-[#F2EDE8]">
                <i data-lucide="book-open" class="w-6 h-6 text-[#C5A059]"></i>
                <div>
                    <h1 class="font-cinzel font-bold tracking-widest uppercase text-sm">Menú de Gala (Díptico)</h1>
                    <p class="text-[10px] text-[#C5A059] tracking-widest uppercase">Proyecto Integrador D5</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button onclick="imprimirPDF()" class="bg-[#C5A059] text-[#1A0F0A] px-6 py-2 rounded uppercase font-bold text-xs tracking-widest border-2 border-[#C5A059] hover:bg-[#AA771C] transition shadow-md flex items-center gap-2 whitespace-nowrap">
                    <i data-lucide="printer" class="w-4 h-4"></i> Imprimir en PDF
                </button>
            </div>
        </div>
    </div>

    <!-- ÁREA DE VISTA PREVIA (No se imprime) -->
    <div class="print:hidden flex-grow flex items-center justify-center p-8 bg-custom">
        <div class="text-center">
            <p class="text-[#C5A059] mb-4 text-xs uppercase tracking-widest font-bold"><i data-lucide="eye" class="inline w-4 h-4 mb-1"></i> Vista Previa (1 Menú)</p>
            
            <!-- CONTENEDOR DE LA TARJETA DE VISTA PREVIA -->
            <div class="menu-card card-shadow relative mx-auto transition-transform duration-500 hover:scale-[1.02]" id="preview-card">
                <!-- Se inyecta el diseño con JS -->
            </div>
            
            <p class="text-white opacity-60 mt-6 text-[10px] uppercase tracking-widest max-w-sm mx-auto">
                Al imprimir se generarán automáticamente 2 menús juntos en una hoja tamaño carta en formato horizontal. Puedes cortarlos a la mitad o doblarlos como díptico.
            </p>
        </div>
    </div>

    <!-- ÁREA DE IMPRESIÓN (Solo visible al imprimir) -->
    <!-- Se colocan 2 menús llenando exactamente una hoja Carta Horizontal (11 x 8.5 pulgadas) -->
    <div id="print-area" class="hidden print:flex w-[11in] h-[8.5in] bg-white flex-row justify-center items-center overflow-hidden">
        <div class="menu-card relative" id="print-card-1"></div>
        <div class="menu-card relative" id="print-card-2"></div>
    </div>

    <script>
        // Función para generar el diseño interno del Menú
        function generarDiseñoMenu() {
            return `
                <div class="relative w-full h-full border-[1.5px] border-[#C5A059] inner-border flex flex-col items-center justify-between bg-[#751428] overflow-hidden p-6 sm:p-8">
                    
                    <!-- SVG Esquina Superior Izquierda -->
                    <svg class="absolute -top-4 -left-4 w-48 h-48 pointer-events-none opacity-40 mix-blend-overlay" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 100 Q 50 20 120 40 Q 80 80 20 100 Z" fill="#C5A059"/>
                        <path d="M10 120 Q 30 50 100 80 Q 50 110 10 120 Z" fill="#F8F5F2"/>
                        <path d="M40 20 Q 100 10 140 60 Q 90 60 40 20 Z" fill="#C5A059"/>
                        <path d="M10 10 Q 60 -10 80 40" stroke="#C5A059" stroke-width="2" fill="none"/>
                        <path d="M20 100 Q 50 20 120 40" stroke="#C5A059" stroke-width="1.5" fill="none"/>
                        <circle cx="40" cy="30" r="3.5" fill="#C5A059"/>
                    </svg>

                    <!-- SVG Esquina Inferior Derecha -->
                    <svg class="absolute -bottom-4 -right-4 w-48 h-48 pointer-events-none opacity-40 mix-blend-overlay transform rotate-180" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 100 Q 50 20 120 40 Q 80 80 20 100 Z" fill="#C5A059"/>
                        <path d="M10 120 Q 30 50 100 80 Q 50 110 10 120 Z" fill="#F8F5F2"/>
                        <path d="M40 20 Q 100 10 140 60 Q 90 60 40 20 Z" fill="#C5A059"/>
                        <path d="M10 10 Q 60 -10 80 40" stroke="#C5A059" stroke-width="2" fill="none"/>
                        <path d="M20 100 Q 50 20 120 40" stroke="#C5A059" stroke-width="1.5" fill="none"/>
                        <circle cx="40" cy="30" r="3.5" fill="#C5A059"/>
                    </svg>

                    <!-- HEADER DEL MENÚ -->
                    <div class="relative z-10 text-center w-full mt-2">
                        <div class="flex items-center justify-center gap-2 mb-2">
                            <span class="text-[#C5A059] text-[8px]">♦</span>
                            <p class="text-[8px] uppercase tracking-[0.4em] text-[#F8F5F2] font-medium opacity-80 border-b border-[#C5A059] pb-1">
                                Experiencia Gastronómica
                            </p>
                            <span class="text-[#C5A059] text-[8px]">♦</span>
                        </div>
                        <h1 class="font-script text-[2.75rem] text-[#C5A059] leading-none drop-shadow-sm mt-1 mb-1">
                            La Dualidad del Sabor
                        </h1>
                    </div>

                    <!-- DIVISOR ELEGANTE -->
                    <div class="flex items-center justify-center w-full max-w-[80%] mx-auto relative z-10 my-2">
                        <div class="h-px bg-gradient-to-r from-transparent via-[#C5A059] to-transparent w-full opacity-60"></div>
                        <i data-lucide="utensils" class="w-5 h-5 mx-3 text-[#C5A059] opacity-90"></i>
                        <div class="h-px bg-gradient-to-r from-transparent via-[#C5A059] to-transparent w-full opacity-60"></div>
                    </div>

                    <!-- CONTENIDO DEL MENÚ -->
                    <div class="relative z-10 w-full flex-grow flex flex-col justify-evenly px-2 space-y-3">
                        
                        <!-- 1. ANTIPASTO -->
                        <div class="text-center">
                            <p class="text-[11px] uppercase tracking-[0.2em] font-bold text-[#C5A059] mb-1">
                                Antipasto <span class="font-medium opacity-90 tracking-widest text-white">| Cocina de Autor</span>
                            </p>
                            <h2 class="font-serif text-white text-xl font-bold leading-tight drop-shadow-md">Carpaccio de Salmón y Atún Curados</h2>
                            <p class="text-xs text-white opacity-100 mt-1.5 leading-snug px-2 font-medium drop-shadow-sm">
                                Corte fino con esferificación de soya, miel, limón y chile piquín. Equilibrio de matices umami, dulces y cítricos.
                            </p>
                            <div class="mt-2 flex flex-col items-center gap-1">
                                <div class="flex justify-center items-center gap-1.5">
                                    <i data-lucide="glass-water" class="w-4 h-4 text-[#C5A059]"></i>
                                    <p class="text-[11px] font-serif italic text-[#C5A059] tracking-wide">Maridaje: <span class="font-bold text-white not-italic text-sm">Lichi Tónico</span></p>
                                </div>
                                <p class="text-[10px] text-white opacity-90 px-4 font-medium italic text-center leading-tight">
                                    Bebida a base de lichi y agua mineral, fresca y ligeramente cítrica con notas dulces.
                                </p>
                            </div>
                        </div>

                        <!-- 2. PRIMO PIATTO -->
                        <div class="text-center">
                            <p class="text-[11px] uppercase tracking-[0.2em] font-bold text-[#C5A059] mb-1">
                                Primo Piatto <span class="font-medium opacity-90 tracking-widest text-white">| Fusión de Autor</span>
                            </p>
                            <h2 class="font-serif text-white text-xl font-bold leading-tight drop-shadow-md">Ravioli de Requesón y Espinaca</h2>
                            <p class="text-xs text-white opacity-100 mt-1.5 leading-snug px-2 font-medium drop-shadow-sm">
                                Raviolis artesanales con requesón, espinaca y parmesano, en salsa cremosa con espuma de chile poblano y cilantro.
                            </p>
                        </div>

                        <!-- 3. PLATO FUERTE -->
                        <div class="text-center">
                            <p class="text-[11px] uppercase tracking-[0.2em] font-bold text-[#C5A059] mb-1">
                                Plato Fuerte <span class="font-medium opacity-90 tracking-widest text-white">| Italo-Contemporánea</span>
                            </p>
                            <h2 class="font-serif text-white text-xl font-bold leading-tight drop-shadow-md">Pulpo a las Brasas con Acentos Mediterráneos</h2>
                            <p class="text-xs text-white opacity-100 mt-1.5 leading-snug px-2 font-medium drop-shadow-sm">
                                Asado a las brasas, emulsión especiada, puré de plátano macho y repollo morado fermentado.
                            </p>
                            <div class="mt-2 flex flex-col items-center gap-1">
                                <div class="flex justify-center items-center gap-1.5">
                                    <i data-lucide="wine" class="w-4 h-4 text-[#C5A059]"></i>
                                    <p class="text-[11px] font-serif italic text-[#C5A059] tracking-wide">Maridaje: <span class="font-bold text-white not-italic text-sm">Aroma Blanco</span></p>
                                </div>
                                <p class="text-[10px] text-white opacity-90 px-4 font-medium italic text-center leading-tight">
                                    Vino blanco con notas cítricas de limón, matices herbales de romero y burbuja ligera.
                                </p>
                            </div>
                        </div>

                        <!-- 4. DOLCE -->
                        <div class="text-center">
                            <p class="text-[11px] uppercase tracking-[0.2em] font-bold text-[#C5A059] mb-1">
                                Dolce <span class="font-medium opacity-90 tracking-widest text-white">| Cocina de Autor</span>
                            </p>
                            <h2 class="font-serif text-white text-xl font-bold leading-tight drop-shadow-md">Tarta de Chocolate y Mole Poblano</h2>
                            <p class="text-xs text-white opacity-100 mt-1.5 leading-snug px-2 font-medium drop-shadow-sm">
                                Base de cocoa, chocolate semiamargo infusionado con mole casero. Ganache, queso de cabra y crocante de sésamo.
                            </p>
                            <div class="mt-2 flex flex-col items-center gap-1">
                                <div class="flex justify-center items-center gap-1.5">
                                    <i data-lucide="coffee" class="w-4 h-4 text-[#C5A059]"></i>
                                    <p class="text-[11px] font-serif italic text-[#C5A059] tracking-wide">Café de Sobremesa: <span class="font-bold text-white not-italic text-sm">Anís Spice</span></p>
                                </div>
                                <p class="text-[10px] text-white opacity-90 px-4 font-medium italic text-center leading-tight">
                                    Latte frío con especias, espresso, un toque de ron blanco y jarabe botánico de anís.
                                </p>
                            </div>
                        </div>

                    </div>

                    <!-- FOOTER DEL MENÚ -->
                    <div class="relative z-10 text-center w-full mt-3 border-t border-[#C5A059] border-opacity-30 pt-3">
                        <p class="font-cinzel text-[10px] text-[#C5A059] tracking-[0.3em] uppercase">Grupo D5 Gastronomía</p>
                        <p class="text-[#F2EDE8] opacity-50 text-[7px] tracking-widest uppercase mt-1">Banquete de Gala</p>
                    </div>

                </div>
            `;
        }

        // Inicializar
        window.onload = () => {
            const htmlDiseño = generarDiseñoMenu();

            // Insertar en la vista previa
            document.getElementById('preview-card').innerHTML = htmlDiseño;
            
            // Insertar en las 2 tarjetas para impresión
            document.getElementById('print-card-1').innerHTML = htmlDiseño;
            document.getElementById('print-card-2').innerHTML = htmlDiseño;
            
            lucide.createIcons();
        };

        // Función para mandar a imprimir
        window.imprimirPDF = () => {
            window.print();
        };

    </script>
</body>
</html>
